spring:
  application:
    name: subport

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: kakao
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  kakao:
    admin-key: ${KAKAO_ADMIN_KEY}

  oci:
    bucket-name: ${OCI_BUCKET_NAME}
    namespace: ${OCI_NAMESPACE}
    region: ${OCI_REGION}
    secret-key: ${OCI_SECRET_KEY}
    access-key: ${OCI_ACCESS_KEY}

  koreaexim:
    authkey: ${KOREAEXIM_AUTH_KEY}
    data: AP01

  subscription:
    default-image-url: https://objectstorage.ap-chuncheon-1.oraclecloud.com/n/axnklumwzgke/b/subpport-bucket/o/subscription_default.png

  jwt:
    secret: ${API_JWT_SECRET}